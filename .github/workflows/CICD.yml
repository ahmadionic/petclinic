name: CI/CD Spring Boot Docker App

on:
  push:
    branches:
      - main

jobs:
  # ------------------------
  # 1️⃣ Checkout & Build
  # ------------------------
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Maven
        run: mvn clean package

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: target/*.jar

  # ------------------------
  # 2️⃣ Security Scan
  # ------------------------
  security:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app

      - name: Run SpotBugs
        run: mvn com.github.spotbugs:spotbugs-maven-plugin:spotbugs

      

  # ------------------------
  # 3️⃣ Docker Build & Push
  # ------------------------
  docker:
    needs: security
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_IMAGE }} .

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_IMAGE }}

  # ------------------------
  # 4️⃣ Deploy to EC2
  # ------------------------
  deploy:
    needs: docker
    runs-on: self-hosted
    steps:
      - name: SSH & Deploy Docker Container
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_IMAGE }}
            docker stop petclinic || true
            docker rm petclinic || true
            docker run -d --name petclinic -p 8080:8080 ${{ secrets.DOCKER_IMAGE }}
